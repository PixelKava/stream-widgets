<style>

         --sun:#F6B53C; --lilac:#8E7CDB; --green:#6FB36B; --muted:#8A96A0; --line:#EDE5D7; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);background:var(--cream);line-height:1.5}
  .wrap{max-width:1000px;margin:0 auto;padding:24px}
  .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:20px}
  .dot{width:11px;height:11px;border-radius:50%}
  .langs{display:flex;gap:6px;flex-wrap:wrap}
  .langs button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
  .langs button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .nav{display:flex;gap:8px;margin:16px 0 6px}
  .nav a{text-decoration:none;font-weight:700;font-size:14px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:#fff}
  .nav a.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  h1{font-size:29px;margin:16px 0 4px}
  .sub{color:var(--muted);margin-bottom:22px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:26px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px}
  label{display:block;font-weight:700;font-size:14px;margin:14px 0 5px}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .preview{border-radius:14px;overflow:hidden;min-height:170px;
    background-image:linear-gradient(45deg,#333a45 25%,transparent 25%),linear-gradient(-45deg,#333a45 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#333a45 75%),linear-gradient(-45deg,transparent 75%,#333a45 75%);
    background-color:#2b3440;background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0}
  iframe{width:100%;height:200px;border:0;display:block}
  .hint{font-size:13px;color:var(--muted);margin-top:6px}
  .urlbox{margin-top:18px}
  textarea{width:100%;height:70px;padding:10px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-family:monospace;resize:none}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .btn{padding:12px 20px;border:0;border-radius:12px;background:var(--coral);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
  .btn.alt{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn:hover{filter:brightness(1.04)}
  .swatches{display:flex;gap:8px;margin-top:4px;align-items:center;flex-wrap:wrap}
  .sw{width:34px;height:34px;border-radius:9px;cursor:pointer;border:3px solid transparent}
  .sw.on{border-color:var(--ink)}
  .sw.custom{display:flex;align-items:center;justify-content:center;border:2px dashed var(--muted);font-size:18px;color:var(--muted);position:relative;overflow:hidden}
  .sw.custom input{position:absolute;inset:0;opacity:0;cursor:pointer}

          <button class="btn alt" id="reset" data-i18n="btn_reset"></button>
        </div>

  document.getElementById('importbtn').textContent = IMP[lang].b;
  document.getElementById('mile_label').textContent = IMP[lang].m;
  document.getElementById('live_label').textContent = IMP[lang].lv;
  document.getElementById('live_note').textContent = IMP[lang].ln;
  document.getElementById('connect_link').textContent = IMP[lang].cl;
  document.getElementById('connect_note').textContent = IMP[lang].cn;
  try{ localStorage.setItem('pk_lang', lang); }catch(e){}
}
function buildParams(){
  const p = new URLSearchParams();
  p.set('label', el.label.value);
  p.set('current', el.current.value || '0');
  p.set('goal', el.goal.value || '100');
  if (el.prefix.value) p.set('prefix', el.prefix.value);
  if (el.suffix.value) p.set('suffix', el.suffix.value);
  if (useCustom) p.set('color', customEl.value); else p.set('theme', theme);
  p.set('text', el.text.value);
  p.set('height', el.height.value);
  if (el.style.value !== 'rounded') p.set('style', el.style.value);
  if (el.done.value) p.set('done', el.done.value);
  if (el.milestones.value) p.set('milestones', el.milestones.value);
  if (MY_ID && document.getElementById('livemode').checked) p.set('api', WORKER_API + '?id=' + MY_ID);
  return p.toString();
}
function save(){
  const s = {}; FIELDS.forEach(i=>s[i]=el[i].value);
  s.theme=theme; s.useCustom=useCustom; s.custom=customEl.value;
  try{ localStorage.setItem('pk_goalbar', JSON.stringify(s)); }catch(e){}
}
function refresh(){
  document.getElementById('hval').textContent = el.height.value;
  const qs = buildParams();
  document.getElementById('prev').src = 'goal.html?' + qs;
  const abs = new URL('goal.html', location.href); abs.search = qs;
  document.getElementById('url').value = abs.toString();
  save();
}
function selectSwatch(t){
  theme = t; useCustom = false;
  document.querySelectorAll('#swatches .sw[data-theme]').forEach(x=>x.classList.toggle('on', x.dataset.theme===t));
  document.querySelector('.sw.custom').classList.remove('on');
}
FIELDS.forEach(i=>el[i].addEventListener('input', refresh));
document.getElementById('livemode').addEventListener('change', refresh);
document.querySelectorAll('#swatches .sw[data-theme]').forEach(s=>s.addEventListener('click',()=>{ selectSwatch(s.dataset.theme); refresh(); }));
customEl.addEventListener('input', ()=>{
  useCustom = true;
  document.querySelectorAll('#swatches .sw[data-theme]').forEach(x=>x.classList.remove('on'));
  document.querySelector('.sw.custom').classList.add('on');
  refresh();
});
document.querySelectorAll('#langs button').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));
document.getElementById('copy').addEventListener('click',()=>{
  const t=document.getElementById('url'); t.select(); navigator.clipboard?.writeText(t.value);
  const b=document.getElementById('copy'); b.textContent=T[lang].btn_copied; setTimeout(()=>b.textContent=T[lang].btn_copy,1500);
});
document.getElementById('newtab').addEventListener('click',()=>window.open(document.getElementById('url').value,'_blank','noopener'));
document.getElementById('reset').addEventListener('click',()=>{
  try{ localStorage.removeItem('pk_goalbar'); }catch(e){}
  location.reload();
});
document.getElementById('importbtn').addEventListener('click',()=>{
  const raw = document.getElementById('importurl').value.trim();
  if(!raw) return;
  try{
    const p = new URLSearchParams(raw.includes('?') ? raw.split('?')[1] : raw);
    if(p.has('label'))   el.label.value   = p.get('label');
    if(p.has('current')) el.current.value = p.get('current');
    if(p.has('goal'))    el.goal.value    = p.get('goal');
    el.prefix.value = p.get('prefix') || '';
    el.suffix.value = p.get('suffix') || '';
    el.text.value   = p.get('text')   || '#ffffff';
    el.height.value = p.get('height') || '30';
    el.style.value  = p.get('style')  || 'rounded';
    el.done.value   = p.get('done')   || '';
    if(p.has('color')){ useCustom=true; customEl.value=p.get('color');
      document.querySelectorAll('#swatches .sw[data-theme]').forEach(x=>x.classList.remove('on'));
      document.querySelector('.sw.custom').classList.add('on'); }
    else { selectSwatch(p.get('theme') || 'teal'); }
    refresh();
    const b=document.getElementById('importbtn'); const old=b.textContent;
    b.textContent='✓'; setTimeout(()=>b.textContent=old,1200);
  }catch(e){ alert('Invalid link'); }
});

// відновлення збережених налаштувань
try{
  const s = JSON.parse(localStorage.getItem('pk_goalbar')||'null');
  if(s){ FIELDS.forEach(i=>{ if(s[i]!=null) el[i].value=s[i]; });
    if(s.custom) customEl.value=s.custom;
    if(s.useCustom){ useCustom=true; document.querySelector('.sw.custom').classList.add('on'); }
    else selectSwatch(s.theme||'teal'); }
  else selectSwatch('teal');
}catch(e){ selectSwatch('teal'); }

// Фаза 3: жива версія залежить від наявності ?id= (приходить із connect.html)
if (MY_ID) {
  document.getElementById('liveConnected').style.display = 'block';
  document.getElementById('livemode').checked = true; // підключено → вмикаємо живий режим
} else {
  document.getElementById('liveConnect').style.display = 'block'; // ще не підключено → кнопка на connect.html
}

// мова: збережена → браузера → en
let startLang='en';
try{ startLang = localStorage.getItem('pk_lang') || (navigator.language||'en').slice(0,2); }catch(e){}
applyLang(startLang);
refresh();
</script>
</body>
</html>

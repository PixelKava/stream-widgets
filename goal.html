<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Безпека: строга CSP — жодних зовнішніх скриптів/ресурсів/мережі (v1 нічого не вантажить ззовні) -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; base-uri 'none'">
<meta name="referrer" content="no-referrer">
<title>PixelKava — Goal Bar widget</title>
<!-- PixelKava Goal Bar · © 2026 PixelKava · All rights reserved · Free to use on your streams; not for resale/redistribution · ko-fi.com/pixelkava -->
<meta name="author" content="PixelKava">
<meta name="copyright" content="© 2026 PixelKava">
<style>
  /* Прозорий фон — щоб у OBS просвічувала сцена */
  html, body { margin: 0; background: transparent; overflow: hidden;
    font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif; }
  .wrap { padding: 16px 20px; }
  .label { font-weight: 800; font-size: 30px; color: var(--text);
    margin-bottom: 10px; text-shadow: -1.5px -1.5px 0 rgba(0,0,0,.55), 1.5px -1.5px 0 rgba(0,0,0,.55), -1.5px 1.5px 0 rgba(0,0,0,.55), 1.5px 1.5px 0 rgba(0,0,0,.55), 0 2px 7px rgba(0,0,0,.5); letter-spacing: .2px; }
  .track { height: var(--h); background: var(--bg); border-radius: var(--r);
    overflow: hidden; box-shadow: inset 0 2px 7px rgba(0,0,0,.14), 0 0 0 1.5px rgba(0,0,0,.13);
    position: relative; }
  .fill { height: 100%; width: 0; background: var(--fill); border-radius: var(--r);
    transition: width 1.3s cubic-bezier(.22,1,.36,1); box-shadow: 0 0 14px var(--fill);
    position: relative; overflow: hidden; }
  /* живий «блиск», що ковзає по смужці */
  .fill::after { content:""; position:absolute; top:0; left:-40%; width:40%; height:100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,.45), transparent);
    animation: shine 2.6s linear infinite; }
  @keyframes shine { to { left:120%; } }
  /* смугастий стиль */
  .striped .fill { background-image: repeating-linear-gradient(45deg,
    rgba(255,255,255,.18) 0 12px, transparent 12px 24px); }
  /* святкова пульсація при 100% */
  .fill.reached { animation: reached 1.5s ease-in-out infinite; }
  @keyframes reached { 0%,100%{ box-shadow:0 0 14px var(--fill); }
    50%{ box-shadow:0 0 26px var(--fill), 0 0 44px var(--fill); } }
  .row { display: flex; justify-content: space-between; align-items: baseline;
    margin-top: 10px; font-weight: 700; font-size: 24px; color: var(--text);
    text-shadow: -1.5px -1.5px 0 rgba(0,0,0,.55), 1.5px -1.5px 0 rgba(0,0,0,.55), -1.5px 1.5px 0 rgba(0,0,0,.55), 1.5px 1.5px 0 rgba(0,0,0,.55), 0 2px 7px rgba(0,0,0,.5); }
  .pct { opacity: .85; font-size: 21px; }
</style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="label" id="label"></div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="row"><span id="values"></span><span class="pct" id="pct"></span></div>
  </div>
<script>
  const P = new URLSearchParams(location.search);
  const g = (k, d) => (P.get(k) ?? d);
  const THEMES = { teal:'#1FA89A', coral:'#FF7A6B', sun:'#F6B53C', lilac:'#8E7CDB', green:'#6FB36B' };
  const cur  = Math.max(0, +g('current', 0));
  const goal = Math.max(1, +g('goal', 100));
  const fillC = THEMES[g('theme','')] || g('color', '#1FA89A');
  const root = document.documentElement.style;
  root.setProperty('--fill', fillC);
  root.setProperty('--bg',   g('bg',   'rgba(255,255,255,.92)'));
  root.setProperty('--text', g('text', '#FFFFFF'));
  root.setProperty('--h',   (+g('height', 30)) + 'px');
  const style = g('style', 'rounded');
  root.setProperty('--r', style === 'flat' ? '8px' : '999px');
  if (style === 'striped') document.getElementById('wrap').classList.add('striped');
  document.getElementById('label').textContent = g('label', 'Donation Goal');
  const pre = g('prefix', ''), suf = g('suffix', '');
  const pct = Math.min(100, Math.round(cur / goal * 100));
  const fillEl = document.getElementById('fill');
  const doneMsg = g('done', '');
  if (g('showvalues','1') !== '0')
    document.getElementById('values').textContent =
      (pct >= 100 && doneMsg) ? doneMsg : (pre + cur + suf + '  /  ' + pre + goal + suf);
  document.getElementById('pct').textContent = pct + '%';
  if (pct >= 100) fillEl.classList.add('reached');
  // позначки-етапи (milestones): значення через кому → вертикальні риски на смужці
  const ms = g('milestones', '');
  if (ms) {
    const track = document.querySelector('.track');
    ms.split(',').forEach(v => {
      const val = parseFloat(v);
      if (isNaN(val)) return;
      const pos = Math.min(100, val / goal * 100);
      const tick = document.createElement('div');
      tick.style.cssText = 'position:absolute;top:0;bottom:0;left:' + pos +
        '%;width:3px;background:rgba(0,0,0,.28);z-index:2;';
      track.appendChild(tick);
    });
  }
  // невелика затримка → плавна анімація заповнення при завантаженні в OBS
  requestAnimationFrame(() => setTimeout(() => { fillEl.style.width = pct + '%'; }, 150));
</script>
</body>
</html>

<style>
  :root{ --cream:#FFF8EE; --ink:#3A4A5A; --teal:#1FA89A; --coral:#FF7A6B;
         --sun:#F6B53C; --green:#6FB36B; --muted:#5E6A74; --line:#EDE5D7; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);background:var(--cream);line-height:1.55}
  .wrap{max-width:820px;margin:0 auto;padding:24px}
  .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  .brand{display:flex;align-items:center;gap:6px;font-weight:800;font-size:20px}
  .dot{width:11px;height:11px;border-radius:50%}
  .langs{display:flex;gap:6px;flex-wrap:wrap}
  .langs button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
  .langs button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .nav{display:flex;gap:8px;margin:14px 0 2px;flex-wrap:wrap}
  .nav a{text-decoration:none;font-weight:700;font-size:14px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:#fff}
  .nav a.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  h1{font-size:28px;margin:18px 0 4px}
  .sub{color:var(--muted);margin-bottom:20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:18px}
  .card h2{font-size:18px;margin-bottom:10px}
  .how{list-style:none;display:grid;gap:10px}
  .how li{display:flex;gap:10px;align-items:flex-start}
  .num{flex:0 0 26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px}
  .privacy{font-size:13px;color:var(--muted);margin-top:12px}
  label{display:block;font-weight:700;font-size:14px;margin:6px 0 5px}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit}
  .hint{font-size:13px;color:var(--muted);margin-top:6px}
  .btn{padding:12px 22px;border:0;border-radius:12px;background:var(--coral);color:#fff;font-weight:800;font-size:15px;cursor:pointer;margin-top:12px}
  .btn:hover{filter:brightness(1.04)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.alt{background:#fff;color:var(--ink);border:1px solid var(--line);padding:8px 14px;font-size:13px;margin-top:0}
  .status{margin-top:12px;font-size:14px;font-weight:700;min-height:20px}
  .status.err{color:var(--coral)} .status.ok{color:var(--green)}
  .result{display:none}
  .field{margin-top:14px}
  .field .row{display:flex;gap:8px;align-items:center}
  textarea{width:100%;height:54px;padding:9px;border:1px solid var(--line);border-radius:10px;font-size:12px;font-family:monospace;resize:none;background:#FBF7EF}
  .warn{background:#FFF3E6;border:1px solid var(--sun);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:8px}
  .steps ol{margin-left:20px} .steps li{margin:7px 0}
  footer{margin-top:24px;color:var(--muted);font-size:13px;text-align:center}
  a{color:var(--teal)}
  .cf-turnstile{margin:14px 0}
</style>
<!-- Cloudflare Turnstile (анти-бот капча) -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="dot" style="background:var(--coral)"></span><span class="dot" style="background:var(--sun)"></span><span class="dot" style="background:var(--teal)"></span>&nbsp;PixelKava</div>
    <div class="langs" id="langs">
      <button data-lang="en">English</button><button data-lang="uk">Українська</button>
      <button data-lang="es">Español</button><button data-lang="pt">Português</button>
      <button data-lang="de">Deutsch</button>
    </div>
  </div>

  <div class="nav">
    <a href="index.html" id="t_tab_build"></a>
    <a href="connect.html" class="on" id="t_tab_conn"></a>
  </div>

  <h1 id="t_title"></h1>
  <p class="sub" id="t_sub"></p>

  <!-- Пояснення для новачків -->
  <div class="card">
    <h2 id="t_how_h"></h2>
    <ul class="how">
      <li><span class="num">1</span><span id="t_how1"></span></li>
      <li><span class="num">2</span><span id="t_how2"></span></li>
      <li><span class="num">3</span><span id="t_how3"></span></li>
    </ul>
    <p class="privacy" id="t_privacy"></p>
  </div>

  <!-- Форма підключення -->
  <div class="card">
    <h2 id="t_conn_h"></h2>
    <label id="t_tok_label" for="token"></label>
    <input id="token" type="text" autocomplete="off" spellcheck="false" placeholder="Ko-fi Verification Token">
    <p class="hint" id="t_tok_hint"></p>
    <!-- Turnstile: ВСТАВ свій data-sitekey (публічний ключ із Cloudflare → Turnstile). -->
    <div class="cf-turnstile" data-sitekey="0x4AAAAAADqPBuPeTdUHdKHL" data-action="turnstile-spin-v1"></div>
    <button class="btn" id="connectBtn"></button>
    <div class="status" id="status"></div>
  </div>

  <!-- Результат -->
  <div class="card result" id="result">
    <h2 id="t_res_h"></h2>

    <div class="field">
      <label id="t_res_widget"></label>
      <div class="row"><textarea id="out_widget" readonly></textarea><button class="btn alt" data-copy="out_widget"></button></div>
      <p class="hint" id="t_rn_widget"></p>
    </div>
    <div class="field">
      <label id="t_res_webhook"></label>
      <div class="row"><textarea id="out_webhook" readonly></textarea><button class="btn alt" data-copy="out_webhook"></button></div>
      <p class="hint" id="t_rn_webhook"></p>
    </div>
    <div class="field">
      <label id="t_res_reset"></label>
      <div class="row"><textarea id="out_reset" readonly></textarea><button class="btn alt" data-copy="out_reset"></button></div>
      <p class="hint" id="t_rn_reset"></p>
      <div class="warn" id="t_warn_reset"></div>
    </div>
    <a class="btn" id="customizeBtn" href="index.html" style="display:inline-block;text-decoration:none;margin-top:6px"></a>
  </div>

  <!-- Онови Ko-fi-токен БЕЗ зміни id (з'являється, коли є збережена реєстрація) -->
  <div class="card" id="updateCard" style="display:none">
    <h2 id="t_upd_h"></h2>
    <p class="hint" id="t_upd_note"></p>
    <input id="updToken" type="text" autocomplete="off" spellcheck="false" placeholder="New Ko-fi Verification Token">
    <button class="btn alt" id="updBtn" style="margin-top:10px"></button>
    <div class="status" id="updStatus"></div>
  </div>

  <footer>© 2026 PixelKava · <a href="index.html" id="t_nav_builder"></a> · <a href="https://ko-fi.com/pixelkava" rel="noopener">ko-fi.com/pixelkava</a></footer>
</div>

    customize:"🎨 Aussehen anpassen (Farbe, Stil, Text) →",
    upd_h:"Aktualisiere deinen Ko-fi-Token", upd_note:"Ko-fi-Token erneuert? Füge den neuen ein — deine Links (Widget, Webhook, Reset) bleiben gleich.", upd_btn:"Token aktualisieren", upd_ok:"✓ Token aktualisiert — Spenden zählen wieder.", upd_err:"Aktualisierung fehlgeschlagen. Bitte erneut versuchen.",
    tab_build:"🎨 Editor", tab_conn:"🔴 Ko-fi verbinden",
    copy:"Kopieren", copied:"Kopiert!",
    setup_h:"Letzte Einrichtung (einmalig)",
    setup1:"In Ko-fi → Settings → Webhooks: die obige Webhook-URL einfügen und speichern.",
    setup2:"Widget-Link kopieren → OBS → eine Browser Source hinzufügen (ca. 600×150).",
    setup3:"Vor jedem Stream: das Reset-Lesezeichen öffnen, um das Ziel bei 0 zu starten.",
    nav_builder:"← Goal-Bar-Editor" }
};

let lang = "en";
let SAVED = null; // збережена реєстрація {id, resetKey, ...} — для оновлення токена без зміни id

function applyLang(l){
  lang = T[l] ? l : "en";
  const d = T[lang];
  // підписи через textContent (анти-XSS) за id t_<key>
  ["title","sub","tab_build","tab_conn","how_h","how1","how2","how3","privacy","conn_h","tok_label","tok_hint",
   "res_h","res_widget","rn_widget","res_webhook","rn_webhook","res_reset","rn_reset","warn_reset","upd_h","upd_note","nav_builder"]
    .forEach(k => { const el = document.getElementById("t_"+k); if (el) el.textContent = d[k]; });
  document.getElementById("connectBtn").textContent = d.connect_btn;
  document.getElementById("customizeBtn").textContent = d.customize;
  document.getElementById("updBtn").textContent = d.upd_btn;
  document.querySelectorAll("[data-copy]").forEach(b => b.textContent = d.copy);
  document.documentElement.lang = lang;
  document.querySelectorAll("#langs button").forEach(b => b.classList.toggle("on", b.dataset.lang === lang));
  try { localStorage.setItem("pk_connect_lang", lang); } catch(e){}
}

// автовизначення: збережений вибір → мова браузера → EN
(function initLang(){
  let l = null;
  try { l = localStorage.getItem("pk_connect_lang"); } catch(e){}
  if (!l) { const b = (navigator.language||"").slice(0,2).toLowerCase(); if (T[b]) l = b; }
  applyLang(l || "en");
})();

document.querySelectorAll("#langs button").forEach(b =>
  b.addEventListener("click", () => applyLang(b.dataset.lang)));

// ── Підключення: POST /register ──
const btn = document.getElementById("connectBtn");
const statusEl = document.getElementById("status");

function setStatus(msg, kind){ statusEl.textContent = msg; statusEl.className = "status" + (kind ? " "+kind : ""); }
function resetTs(){ try { window.turnstile && turnstile.reset(); } catch(e){} } // скинути капчу (токен одноразовий)

btn.addEventListener("click", async () => {
  const token = document.getElementById("token").value.trim();
  if (token.length < 6) { setStatus(T[lang].err_token, "err"); return; }
  // токен Turnstile (порожній, якщо капчу ще не пройдено/не налаштовано)
  const tsToken = (window.turnstile && turnstile.getResponse()) ||
    (document.querySelector('[name="cf-turnstile-response"]') || {}).value || "";
  btn.disabled = true; setStatus(T[lang].connecting, "");
  try {
    const res = await fetch(WORKER + "/register", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, turnstileToken: tsToken }), cache: "no-store"
    });
    if (res.status === 403) { setStatus(T[lang].err_captcha, "err"); resetTs(); btn.disabled = false; return; }
    if (res.status === 429) { setStatus(T[lang].err_rate, "err"); resetTs(); btn.disabled = false; return; }
    if (res.status === 400) { setStatus(T[lang].err_token, "err"); resetTs(); btn.disabled = false; return; }
    if (!res.ok) { setStatus(T[lang].err_generic, "err"); resetTs(); btn.disabled = false; return; }
    const d = await res.json();

    // будуємо посилання віджета (api = totalUrl, коректно закодований)
    const wp = new URLSearchParams();
    wp.set("label", "Donation Goal");
    wp.set("api", d.totalUrl);
    const widgetUrl = PAGES + "/goal.html?" + wp.toString();

    document.getElementById("out_widget").value  = widgetUrl;
    document.getElementById("out_webhook").value = d.webhookUrl;
    document.getElementById("out_reset").value   = d.resetUrl;
    document.getElementById("customizeBtn").href = "index.html?id=" + encodeURIComponent(d.id); // Фаза 3: вигляд із цим id
    document.getElementById("result").style.display = "block";
    // зберігаємо результат, щоб посилання й навігація НЕ зникали при поверненні на сторінку
    SAVED = { id: d.id, resetKey: d.resetKey, widgetUrl, webhookUrl: d.webhookUrl, resetUrl: d.resetUrl };
    try { localStorage.setItem("pk_connect_result", JSON.stringify(SAVED)); } catch (e) {}
    document.getElementById("updateCard").style.display = "block";
    setStatus("", "ok");
    document.getElementById("result").scrollIntoView({ behavior: "smooth" });
  } catch (e) {
    setStatus(T[lang].err_generic, "err"); resetTs(); btn.disabled = false;
  }
});

// кнопки «Копіювати»
document.querySelectorAll("[data-copy]").forEach(b => {
  b.addEventListener("click", () => {
    const ta = document.getElementById(b.dataset.copy);
    ta.select(); navigator.clipboard && navigator.clipboard.writeText(ta.value);
    const old = b.textContent; b.textContent = T[lang].copied;
    setTimeout(() => { b.textContent = T[lang].copy; }, 1400);
  });
});

// Оновлення Ko-fi-токена без зміни id (авторизація — resetKey зі збереженої реєстрації)
const updBtn = document.getElementById("updBtn");
const updStatusEl = document.getElementById("updStatus");
function setUpd(msg, kind){ updStatusEl.textContent = msg; updStatusEl.className = "status" + (kind ? " " + kind : ""); }
updBtn.addEventListener("click", async () => {
  if (!SAVED || !SAVED.id || !SAVED.resetKey) { setUpd(T[lang].upd_err, "err"); return; }
  const token = document.getElementById("updToken").value.trim();
  if (token.length < 6) { setUpd(T[lang].err_token, "err"); return; }
  updBtn.disabled = true; setUpd(T[lang].connecting, "");
  try {
    const res = await fetch(WORKER + "/update-token", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: SAVED.id, resetKey: SAVED.resetKey, token }), cache: "no-store"
    });
    if (res.ok) { setUpd(T[lang].upd_ok, "ok"); document.getElementById("updToken").value = ""; }
    else { setUpd(T[lang].upd_err, "err"); }
  } catch (e) { setUpd(T[lang].upd_err, "err"); }
  updBtn.disabled = false;
});

// При поверненні на сторінку — показати збережену реєстрацію (посилання + «Налаштувати вигляд» + оновлення токена),
// щоб навігація не зникала. Капчу проходити НЕ треба — це лише показ збереженого.
(function showSavedResult(){
  let r; try { r = JSON.parse(localStorage.getItem("pk_connect_result") || "null"); } catch (e) {}
  if (!r || !r.id) return;
  SAVED = r;
  document.getElementById("out_widget").value  = r.widgetUrl;
  document.getElementById("out_webhook").value = r.webhookUrl;
  document.getElementById("out_reset").value   = r.resetUrl;
  document.getElementById("customizeBtn").href = "index.html?id=" + encodeURIComponent(r.id);
  document.getElementById("result").style.display = "block";
  if (r.resetKey) document.getElementById("updateCard").style.display = "block";
})();
</script>
</body>
</html>

     Урок Goal Bar (23.06): робиш fetch → мусиш дозволити його в connect-src, інакше default-src тихо блокує. -->

<style>
  :root{ --cream:#FFF8EE; --ink:#3A4A5A; --teal:#1FA89A; --coral:#FF7A6B;
         --sun:#F6B53C; --green:#6FB36B; --muted:#5E6A74; --line:#EDE5D7; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);background:var(--cream);line-height:1.55}
  .wrap{max-width:820px;margin:0 auto;padding:24px}

  .dot{width:11px;height:11px;border-radius:50%}
  .langs{display:flex;gap:6px;flex-wrap:wrap}
  .langs button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
  .langs button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  h1{font-size:28px;margin:18px 0 4px}
  .sub{color:var(--muted);margin-bottom:20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:18px}
  .card h2{font-size:18px;margin-bottom:10px}
  .how{list-style:none;display:grid;gap:10px}
  .how li{display:flex;gap:10px;align-items:flex-start}
  .num{flex:0 0 26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px}
  .privacy{font-size:13px;color:var(--muted);margin-top:12px}
  label{display:block;font-weight:700;font-size:14px;margin:6px 0 5px}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit}
  .hint{font-size:13px;color:var(--muted);margin-top:6px}
  .btn{padding:12px 22px;border:0;border-radius:12px;background:var(--coral);color:#fff;font-weight:800;font-size:15px;cursor:pointer;margin-top:12px}
  .btn:hover{filter:brightness(1.04)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.alt{background:#fff;color:var(--ink);border:1px solid var(--line);padding:8px 14px;font-size:13px;margin-top:0}
  .status{margin-top:12px;font-size:14px;font-weight:700;min-height:20px}
  .status.err{color:var(--coral)} .status.ok{color:var(--green)}
  .result{display:none}
  .field{margin-top:14px}
  .field .row{display:flex;gap:8px;align-items:center}
  textarea{width:100%;height:54px;padding:9px;border:1px solid var(--line);border-radius:10px;font-size:12px;font-family:monospace;resize:none;background:#FBF7EF}
  .warn{background:#FFF3E6;border:1px solid var(--sun);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:8px}
  .steps ol{margin-left:20px} .steps li{margin:7px 0}
  footer{margin-top:24px;color:var(--muted);font-size:13px;text-align:center}
  a{color:var(--teal)}
  .cf-turnstile{margin:14px 0}
</style>

    <h2 id="t_how_h"></h2>
    <ul class="how">
      <li><span class="num">1</span><span id="t_how1"></span></li>
      <li><span class="num">2</span><span id="t_how2"></span></li>
      <li><span class="num">3</span><span id="t_how3"></span></li>
    </ul>

    <label id="t_tok_label" for="token"></label>

let lang = "en";

function applyLang(l){
  lang = T[l] ? l : "en";
  const d = T[lang];
  // підписи через textContent (анти-XSS) за id t_<key>
  ["title","sub","how_h","how1","how2","how3","privacy","conn_h","tok_label","tok_hint",
   "res_h","res_widget","res_webhook","res_reset","warn_reset","setup_h","setup1","setup2","setup3","nav_builder"]
    .forEach(k => { const el = document.getElementById("t_"+k); if (el) el.textContent = d[k]; });
  document.getElementById("connectBtn").textContent = d.connect_btn;
  document.querySelectorAll("[data-copy]").forEach(b => b.textContent = d.copy);
  document.documentElement.lang = lang;
  document.querySelectorAll("#langs button").forEach(b => b.classList.toggle("on", b.dataset.lang === lang));
  try { localStorage.setItem("pk_connect_lang", lang); } catch(e){}
}

// автовизначення: збережений вибір → мова браузера → EN
(function initLang(){
  let l = null;
  try { l = localStorage.getItem("pk_connect_lang"); } catch(e){}
  if (!l) { const b = (navigator.language||"").slice(0,2).toLowerCase(); if (T[b]) l = b; }
  applyLang(l || "en");
})();

document.querySelectorAll("#langs button").forEach(b =>
  b.addEventListener("click", () => applyLang(b.dataset.lang)));

// ── Підключення: POST /register ──
const btn = document.getElementById("connectBtn");
const statusEl = document.getElementById("status");

function setStatus(msg, kind){ statusEl.textContent = msg; statusEl.className = "status" + (kind ? " "+kind : ""); }
function resetTs(){ try { window.turnstile && turnstile.reset(); } catch(e){} } // скинути капчу (токен одноразовий)

btn.addEventListener("click", async () => {
  const token = document.getElementById("token").value.trim();
  if (token.length < 6) { setStatus(T[lang].err_token, "err"); return; }
  // токен Turnstile (порожній, якщо капчу ще не пройдено/не налаштовано)
  const tsToken = (window.turnstile && turnstile.getResponse()) ||
    (document.querySelector('[name="cf-turnstile-response"]') || {}).value || "";
  btn.disabled = true; setStatus(T[lang].connecting, "");
  try {
    const res = await fetch(WORKER + "/register", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, turnstileToken: tsToken }), cache: "no-store"
    });
    if (res.status === 403) { setStatus(T[lang].err_captcha, "err"); resetTs(); btn.disabled = false; return; }
    if (res.status === 429) { setStatus(T[lang].err_rate, "err"); resetTs(); btn.disabled = false; return; }
    if (res.status === 400) { setStatus(T[lang].err_token, "err"); resetTs(); btn.disabled = false; return; }
    if (!res.ok) { setStatus(T[lang].err_generic, "err"); resetTs(); btn.disabled = false; return; }
    const d = await res.json();

    // будуємо посилання віджета (api = totalUrl, коректно закодований)
    const wp = new URLSearchParams();
    wp.set("label", "Donation Goal");
    wp.set("api", d.totalUrl);
    const widgetUrl = PAGES + "/goal.html?" + wp.toString();

    document.getElementById("out_widget").value  = widgetUrl;
    document.getElementById("out_webhook").value = d.webhookUrl;
    document.getElementById("out_reset").value   = d.resetUrl;
    document.getElementById("result").style.display = "block";
    setStatus("", "ok");
    document.getElementById("result").scrollIntoView({ behavior: "smooth" });
  } catch (e) {
    setStatus(T[lang].err_generic, "err"); resetTs(); btn.disabled = false;
  }
});

// кнопки «Копіювати»
document.querySelectorAll("[data-copy]").forEach(b => {
  b.addEventListener("click", () => {
    const ta = document.getElementById(b.dataset.copy);
    ta.select(); navigator.clipboard && navigator.clipboard.writeText(ta.value);
    const old = b.textContent; b.textContent = T[lang].copied;
    setTimeout(() => { b.textContent = T[lang].copy; }, 1400);
  });
});
